# version: '2.38'

services:
    db:
        container_name: postgres_db
        image: postgres:latest
        restart: always
        env_file:
            - .env
        environment:
            - POSTGRES_USER=${MYSQL_USER}
            - POSTGRES_PASSWORD=${MYSQL_PASSWORD}
            - POSTGRES_DB=${MYSQL_DB}
        ports:
            - 5434:5432
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - backend

    redis:
        container_name: redis
        image: redis:7.0
        restart: always
        env_file:
            - .env
        command: redis-server --requirepass ${REDIS_PASSWORD}
        ports:
            - 6380:6379
        volumes:
            - redis_data:/data
        networks:
            - backend

volumes:
    postgres_data:
    redis_data:

networks:
    backend:
